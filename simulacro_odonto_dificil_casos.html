<!doctype html>
<html lang='es'>
<head>
<meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Simulacro Odonto Nivel Difícil</title>
<style>
body{margin:0;background:#f4f0ff;color:#241d32;font-family:Arial,sans-serif}header{background:linear-gradient(135deg,#5c4dff,#ff6fae);color:white;text-align:center;padding:28px 16px}.wrap{max-width:980px;margin:auto;padding:18px}.bar{display:flex;gap:10px;justify-content:space-between;align-items:center;flex-wrap:wrap}.score,.card{background:#fff;border-radius:18px;box-shadow:0 4px 18px #0001}.score{padding:12px 16px;font-weight:700}.card{padding:20px;margin:18px 0}.tag{display:inline-block;background:#eee7ff;color:#5d3cff;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700}h2{font-size:20px;color:#5d3cff}.q{line-height:1.55}.opt{display:block;width:100%;text-align:left;border:2px solid #e5def6;background:#fcfaff;border-radius:13px;padding:12px;margin:9px 0;cursor:pointer;font-size:15px}.opt:hover{border-color:#9b82ff;background:#f3efff}.ok{border-color:#1dab69!important;background:#e9fff3!important}.bad{border-color:#e84b6a!important;background:#fff0f3!important}.fb{display:none;margin-top:12px;border-radius:13px;padding:13px;line-height:1.5}.good{display:block;background:#e9fff3;border:1px solid #1dab69}.wrong{display:block;background:#fff0f3;border:1px solid #e84b6a}.btn{border:0;background:#5c4dff;color:#fff;padding:11px 14px;border-radius:12px;font-weight:700;cursor:pointer}.btn:hover{background:#4b3bd9}.small{color:#6b617a;font-size:13px}footer{text-align:center;color:#6b617a;padding:20px;font-size:13px}
</style>
</head>
<body>
<header><h1>🦷 Simulacro Odonto Nivel Difícil</h1><p>Preguntas tipo examen: casos largos, comorbilidades, dosis, interacciones y conducta clínica.</p></header>
<div class='wrap'><div class='bar'><div class='score' id='score'>Puntaje: 0 / 0</div><div><button class='btn' onclick='resetQuiz()'>Reiniciar</button> <button class='btn' onclick='shuffleQuiz()'>Mezclar</button></div></div><p class='small'>Aplasta una respuesta. Al final de cada pregunta aparece la explicación.</p><div id='quiz'></div></div><footer>Hecho para estudiar 💖</footer>
<script>
let qs=[
{t:'Caso difícil',q:'1. Paciente masculino de 26 años recibe 4 cartuchos de lidocaína 2% con epinefrina 1:100000 para cirugía de tercer molar. A los 3 minutos presenta locuacidad, sabor metálico, tinnitus, visión borrosa y temblor fino, pero mantiene presión y respiración. ¿Cuál es la interpretación y conducta inicial más correcta?',o:['Reacción vasovagal; elevar piernas y continuar cuando despierte.','Toxicidad sistémica inicial por anestésico local; suspender, oxígeno, vía aérea y monitorizar.','Anafilaxia; administrar amoxicilina y observar.','Hipoglucemia; dar bebida azucarada y reiniciar la cirugía.'],a:1,e:'Los síntomas neurológicos tempranos después de anestesia local apuntan a toxicidad sistémica. No se continúa el procedimiento; primero se evita progresión a convulsiones o depresión respiratoria.'},
{t:'Caso difícil',q:'2. Paciente de 68 años, antecedente de angina estable controlada, requiere exodoncia simple. El odontólogo planea usar lidocaína con epinefrina 1:100000. Ya usó un cartucho y piensa usar dos más. ¿Qué análisis es más apropiado?',o:['Puede usar hasta 11 cartuchos porque el límite lo da solo la lidocaína.','Debe evitar toda epinefrina aunque esté controlado.','Dos cartuchos 1:100000 se acercan al límite cardiaco de 0,04 mg; debe limitar dosis, aspirar y controlar estrés.','Debe duplicar epinefrina para evitar dolor, porque el dolor genera más catecolaminas.'],a:2,e:'En riesgo cardiovascular se usa como referencia 0,04 mg de epinefrina. Un cartucho 1:100000 tiene cerca de 0,018 mg, por eso dos cartuchos ya se aproximan al límite.'},
{t:'Caso difícil',q:'3. Paciente con hipertensión controlada toma enalapril. Tras exodoncia recibe ibuprofeno 600 mg cada 8 horas por 5 días. Regresa con presión elevada. ¿Cuál explicación farmacológica es la más probable?',o:['El ibuprofeno bloqueó canales de sodio y produjo taquicardia.','El AINE disminuyó prostaglandinas renales, favoreciendo retención de sodio y menor efecto antihipertensivo.','El ibuprofeno estimuló directamente receptores beta 2.','El AINE aumentó la eliminación renal de sodio y produjo hipovolemia.'],a:1,e:'Los AINE pueden antagonizar antihipertensivos por inhibición de prostaglandinas renales, con retención hidrosalina y posible aumento de presión.'},
{t:'Caso difícil',q:'4. Paciente ASA I, 24 años, requiere exodoncia de terceros molares. Se prescribe dexametasona 8 mg una hora antes. ¿Qué mecanismo explica mejor su utilidad antiinflamatoria?',o:['Inhibición selectiva de COX-2.','Bloqueo competitivo de receptores H1.','Inhibición de fosfolipasa A2, reduciendo mediadores de inflamación.','Inhibición directa de síntesis de tromboxano A2 únicamente.'],a:2,e:'Los glucocorticoides reducen inflamación por una vía más alta que los AINE: inhiben fosfolipasa A2 y reducen formación de ácido araquidónico y sus mediadores.'},
{t:'Caso difícil',q:'5. Paciente diabético tipo 2 controlado será sometido a cirugía de tercer molar. Se considera dexametasona para edema. ¿Qué riesgo debe explicarse y vigilarse especialmente?',o:['Hipoglucemia inmediata por aumento de insulina.','Hiperglucemia transitoria por efecto glucocorticoide.','Metahemoglobinemia por vasoconstrictor.','Broncoespasmo por bloqueo beta.'],a:1,e:'La dexametasona puede elevar la glucosa. No significa prohibición absoluta si está controlado, pero sí requiere precaución, dosis razonable y vigilancia.'},
{t:'Caso difícil',q:'6. Paciente asmática controlada refiere que una vez presentó broncoespasmo después de tomar aspirina. Consulta por dolor postoperatorio. ¿Qué prescripción es más prudente?',o:['Ibuprofeno 600 mg cada 8 h porque es distinto a aspirina.','Ketorolaco 10 mg cada 6 h porque es más potente.','Paracetamol en dosis terapéutica, evitando AINE no selectivos.','Diclofenaco y naproxeno combinados para bajar prostaglandinas.'],a:2,e:'Algunos asmáticos son sensibles a aspirina/AINE. En esos casos se evita AINE no selectivo y se prefiere alternativa como paracetamol si no hay contraindicación.'},
{t:'Caso difícil',q:'7. Paciente con válvula protésica requiere extracción. Es alérgico a penicilina con antecedente de urticaria y angioedema. ¿Qué opción es más coherente para profilaxis según esquemas clásicos?',o:['Amoxicilina 2 g, porque la alergia no importa en dosis única.','Cefalexina 2 g, porque toda cefalosporina es segura.','Clindamicina 600 mg antes del procedimiento.','Metronidazol 500 mg cada 8 h por 7 días.'],a:2,e:'En alergia inmediata a penicilina se evitan penicilinas y se tiene precaución con cefalosporinas. Un esquema clásico alternativo es clindamicina 600 mg antes.'},
{t:'Caso difícil',q:'8. Niño de 22 kg con cardiopatía de alto riesgo requiere profilaxis con amoxicilina. ¿Cuál es la dosis si se usa 50 mg/kg?',o:['550 mg.','880 mg.','1100 mg.','2000 mg.'],a:2,e:'22 kg x 50 mg/kg = 1100 mg. En pediatría el cálculo por peso es clave, sin superar dosis adulta cuando aplique.'},
{t:'Caso difícil',q:'9. Paciente de 55 kg necesita lidocaína 2% con epinefrina. Si la dosis máxima de lidocaína es 7 mg/kg, ¿cuál combinación de cálculo es correcta?',o:['Máximo 385 mg; cada cartucho 36 mg; aprox. 10 cartuchos por anestésico, aunque puede limitar vasoconstrictor.','Máximo 110 mg; cada cartucho 72 mg; aprox. 1 cartucho.','Máximo 385 mg; cada cartucho 18 mg; aprox. 21 cartuchos.','Máximo 550 mg; cada cartucho 54 mg; aprox. 10 cartuchos.'],a:0,e:'55 x 7 = 385 mg. Lidocaína 2% tiene 20 mg/ml; en 1,8 ml son 36 mg. En clínica también se limita por epinefrina y estado sistémico.'},
{t:'Caso difícil',q:'10. Paciente recibe anestesia y antes de iniciar el procedimiento presenta urticaria generalizada, edema labial, sibilancias e hipotensión. ¿Cuál opción describe mejor el manejo inicial?',o:['Esperar porque la mayoría de alergias se autolimitan.','Adrenalina 1:1000 IM o SC, oxígeno, suspensión del procedimiento y urgencias.','Metronidazol IV porque puede ser bacteriemia.','Colocar en supino y reiniciar cuando pase el miedo.'],a:1,e:'Urticaria, edema, broncoespasmo e hipotensión indican anafilaxia. La adrenalina es prioritaria junto con oxígeno y activación de emergencia.'},
{t:'Caso difícil',q:'11. Paciente con absceso submandibular, fiebre, trismus progresivo, disfagia y elevación del piso de boca. ¿Cuál conducta es más segura?',o:['Solo amoxicilina oral y control en 7 días.','Drenaje casero con enjuagues calientes.','Derivación urgente/hospitalaria por riesgo de vía aérea, más manejo odontológico y antibiótico.','Anestesia infiltrativa local en el área y esperar.'],a:2,e:'Disfagia, trismus progresivo y elevación del piso de boca sugieren infección profunda con riesgo de vía aérea. No es un absceso simple ambulatorio.'},
{t:'Caso difícil',q:'12. Paciente con infección odontógena localizada, sin fiebre, sin celulitis, sin compromiso sistémico y con drenaje establecido. ¿Qué principio terapéutico es más correcto?',o:['Los antibióticos siempre son obligatorios en todo dolor dental.','El manejo local puede ser suficiente; antibiótico se reserva para diseminación o riesgo sistémico.','El aciclovir es primera línea porque todo absceso es viral.','La nistatina cubre bacterias anaerobias.'],a:1,e:'Los antibióticos no sustituyen el tratamiento local. Si no hay diseminación ni signos sistémicos, drenaje/endodoncia/exodoncia puede bastar según caso.'},
{t:'Caso difícil',q:'13. Paciente toma warfarina y requiere cirugía periodontal. Refiere INR reciente de 4,2. ¿Qué decisión es más segura?',o:['Proceder porque todo sangrado dental se controla con algodón.','Indicar aspirina para mejorar hemostasia.','Posponer/interconsultar por INR elevado antes de procedimiento electivo.','Suspender warfarina por cuenta propia 7 días.'],a:2,e:'INR elevado aumenta riesgo de sangrado. No se suspende anticoagulante sin interconsulta; en cirugía electiva se debe coordinar y ajustar riesgo.'},
{t:'Caso difícil',q:'14. Paciente anticoagulado con INR terapéutico cercano a 2,5 requiere exodoncia simple. ¿Cuál enfoque suele ser más razonable?',o:['Suspender anticoagulante siempre.','Continuar con medidas hemostáticas locales, según valoración del caso.','Dar ketorolaco posoperatorio para evitar coágulos.','No usar anestesia local.'],a:1,e:'En procedimientos dentales simples con INR terapéutico, muchas veces se mantiene anticoagulación y se controla sangrado localmente. Se individualiza.'},
{t:'Caso difícil',q:'15. Paciente con hipertiroidismo no controlado recibió epinefrina y durante cirugía presenta fiebre, taquicardia marcada, hipertensión inicial, agitación y confusión. ¿Qué complicación preocupa?',o:['Candidiasis aguda.','Tormenta tiroidea.','Metahemoglobinemia por prilocaína.','Reacción tipo disulfiram.'],a:1,e:'Estrés, cirugía y catecolaminas pueden precipitar crisis tiroidea en hipertiroidismo no controlado. Es una emergencia.'},
{t:'Caso difícil',q:'16. Paciente tratado con propranolol requiere anestesia con vasoconstrictor. ¿Cuál interacción es más importante?',o:['Epinefrina puede producir hipertensión por predominio alfa y bradicardia refleja.','Propranolol neutraliza por completo la anestesia.','Epinefrina causa hipoglucemia inmediata por COX-2.','No existe interacción relevante.'],a:0,e:'Con betabloqueadores no selectivos, la estimulación alfa de epinefrina puede predominar y elevar la presión, con bradicardia refleja.'},
{t:'Caso difícil',q:'17. Paciente con antecedente de infarto hace 3 meses solicita implante electivo. Está asintomático, pero no trae informe cardiológico. ¿Qué conducta es mejor?',o:['Realizar implante con sedación para que no se estrese.','Posponer y solicitar valoración médica; no es urgencia.','Usar 4 cartuchos con epinefrina para lograr hemostasia.','Dar profilaxis antibiótica y continuar.'],a:1,e:'Infarto reciente aumenta riesgo cardiovascular. Un implante es electivo; debe esperar control y valoración médica.'},
{t:'Caso difícil',q:'18. Paciente con EPOC severo refiere que empeora al estar acostado. Durante atención se observa disnea y saturación baja respecto a su basal. ¿Qué opción es más prudente?',o:['Acostarlo completamente para mejorar retorno venoso.','Mantener semisentado, citas cortas, evitar depresión respiratoria y valorar atención médica si se descompensa.','Dar oxígeno a alto flujo sin criterio en todos los casos.','Usar goma dique obligatoria aunque no tolere.'],a:1,e:'En EPOC se evita supino completo y citas largas; el oxígeno debe individualizarse, especialmente en enfermedad avanzada.'},
{t:'Caso difícil',q:'19. Paciente con dolor severo y antecedente de úlcera gástrica activa. ¿Cuál prescripción debe evitarse con mayor claridad?',o:['Paracetamol en dosis terapéuticas.','Ketorolaco por varios días.','Aciclovir tópico.','Amoxicilina profiláctica si indicada.'],a:1,e:'Ketorolaco es AINE potente con riesgo gastrointestinal y debe evitarse en úlcera activa o usarse con extrema precaución y por corto tiempo si no hay alternativa.'},
{t:'Caso difícil',q:'20. Paciente con periodontitis recibe metronidazol 500 mg tres veces al día. ¿Qué advertencia es más importante?',o:['Evitar alcohol por reacción tipo disulfiram.','Tomarlo con alcohol para mejorar absorción.','Suspender cepillado durante el tratamiento.','Usarlo como analgésico principal.'],a:0,e:'Metronidazol puede causar reacción tipo disulfiram con alcohol: náusea, vómito, rubor y malestar.'},
{t:'Caso difícil',q:'21. Paciente con herpes labial activo tiene cita para profilaxis dental estética. ¿Qué decisión es más adecuada?',o:['Proceder porque el herpes solo afecta piel.','Posponer si es electivo y tratar/esperar resolución, por contagio y molestias.','Indicar nistatina como antiviral.','Dar amoxicilina 2 g y continuar.'],a:1,e:'El herpes activo puede contagiarse y empeorar con manipulación. Si el procedimiento es electivo, se pospone.'},
{t:'Caso difícil',q:'22. Paciente con placas blancas removibles, ardor, uso de prótesis y antecedente de antibióticos. ¿Cuál conjunto diagnóstico-tratamiento es más coherente?',o:['Herpes simple - aciclovir.','Candidiasis oral - nistatina o antifúngico.','Absceso odontógeno - metronidazol solamente.','Reacción vasovagal - oxígeno.'],a:1,e:'Placas blanquecinas removibles y ardor, especialmente con prótesis y antibióticos, sugieren candidiasis oral.'},
{t:'Caso difícil',q:'23. Paciente con enfermedad renal crónica consulta por dolor dental. ¿Qué precaución farmacológica general es más correcta?',o:['Preferir AINE a dosis altas porque protegen riñón.','Evitar o limitar AINE y ajustar fármacos eliminados por vía renal según caso.','Usar ketorolaco prolongado porque no afecta riñón.','Duplicar dosis antibiótica sin calcular.'],a:1,e:'Los AINE pueden reducir perfusión renal y empeorar función renal. En enfermedad renal se ajustan dosis y se elige analgésico con precaución.'},
{t:'Caso difícil',q:'24. Paciente con enfermedad hepática y consumo crónico de alcohol solicita paracetamol para dolor. ¿Qué análisis es más apropiado?',o:['Paracetamol siempre es inocuo a cualquier dosis.','Debe cuidarse por riesgo hepatotóxico, evitando sobredosis y valorando alternativa.','Solo importa si se combina con penicilina.','El riesgo principal es broncoespasmo por COX-1.'],a:1,e:'Paracetamol puede ser hepatotóxico en sobredosis o en pacientes con riesgo hepático. Hay que individualizar dosis o elegir alternativa.'},
{t:'Caso difícil',q:'25. Paciente adulto con celulitis odontógena recibe amoxicilina 500 mg + metronidazol 500 mg cada 8 h. ¿Cuál idea es correcta?',o:['El antibiótico reemplaza drenaje o tratamiento dental.','Debe acompañarse de tratamiento local de la causa dental.','El metronidazol cubre herpes.','La amoxicilina es antifúngica.'],a:1,e:'En infecciones odontógenas, el antibiótico ayuda si hay diseminación, pero la causa debe tratarse con drenaje, endodoncia o extracción según caso.'},
{t:'Caso difícil',q:'26. Paciente de 70 kg recibe 5 cartuchos de articaína 4%. ¿Cuántos mg de articaína recibió?',o:['180 mg.','270 mg.','360 mg.','540 mg.'],a:2,e:'Articaína 4% = 40 mg/ml. Un cartucho de 1,8 ml contiene 72 mg. Cinco cartuchos = 360 mg.'},
{t:'Caso difícil',q:'27. Se administra mepivacaína 3% sin vasoconstrictor en 3 cartuchos de 1,8 ml. ¿Cuántos mg se usaron?',o:['108 mg.','162 mg.','216 mg.','54 mg.'],a:1,e:'Mepivacaína 3% = 30 mg/ml. Un cartucho = 54 mg. Tres cartuchos = 162 mg.'},
{t:'Caso difícil',q:'28. Paciente sano recibe 3 cartuchos de lidocaína 2% con epinefrina 1:100000. ¿Qué cálculo es correcto?',o:['Lidocaína 108 mg y epinefrina aprox. 0,054 mg.','Lidocaína 216 mg y epinefrina 0,2 mg.','Lidocaína 54 mg y epinefrina 0,018 mg.','Lidocaína 360 mg y epinefrina 0,04 mg.'],a:0,e:'Lidocaína 2% = 36 mg/cartucho; 3 cartuchos = 108 mg. Epinefrina 1:100000 en 1,8 ml es aprox. 0,018 mg/cartucho; 3 = 0,054 mg.'},
{t:'Caso difícil',q:'29. Paciente hipertenso controlado, con gastritis y dolor postoperatorio leve. ¿Cuál opción suele ser más prudente?',o:['Ketorolaco 10 mg cada 6 h por 7 días.','Paracetamol en dosis terapéutica y reevaluación.','Ibuprofeno 800 mg cada 6 h por una semana.','Aspirina para analgesia por su efecto antiagregante.'],a:1,e:'Por gastritis e hipertensión, conviene evitar AINE intensos o prolongados. Paracetamol puede ser opción si no hay contraindicación.'},
{t:'Caso difícil',q:'30. Paciente con sospecha de síncope vasovagal pierde conciencia antes de anestesia, está pálido y sudoroso. ¿Cuál dato haría pensar más en anafilaxia que en síncope?',o:['Miedo a la aguja.','Pulso lento y palidez.','Urticaria, edema facial y sibilancias.','Recuperación rápida al acostarlo.'],a:2,e:'La anafilaxia se caracteriza por manifestaciones cutáneas y respiratorias como urticaria, edema y sibilancias. El síncope se relaciona con ansiedad, palidez y recuperación en supino.'}
];
let answered={},good=0;
function render(){let box=document.getElementById('quiz');box.innerHTML='';qs.forEach((x,n)=>{let ops=x.o.map((v,i)=>`<button class='opt' onclick='sel(${n},${i},this)'><b>${String.fromCharCode(65+i)})</b> ${v}</button>`).join('');box.innerHTML+=`<div class='card'><span class='tag'>${x.t}</span><h2>Pregunta ${n+1}</h2><div class='q'>${x.q}</div>${ops}<div class='fb' id='f${n}'></div></div>`});score()}
function sel(n,i,b){if(answered[n])return;answered[n]=1;let x=qs[n],card=b.parentElement,bs=card.querySelectorAll('.opt');bs.forEach((z,k)=>{z.disabled=true;if(k==x.a)z.classList.add('ok');if(k==i&&i!=x.a)z.classList.add('bad')});let f=document.getElementById('f'+n);if(i==x.a){good++;f.className='fb good';f.innerHTML=`✅ <b>¡Correcto!</b><br>Respuesta: <b>${String.fromCharCode(65+x.a)}</b><br><b>Explicación:</b> ${x.e}`;}else{f.className='fb wrong';f.innerHTML=`❌ <b>No exactamente.</b><br>Marcaste: <b>${String.fromCharCode(65+i)}</b><br>Correcta: <b>${String.fromCharCode(65+x.a)}</b><br><b>Explicación:</b> ${x.e}`;}score()}
function score(){document.getElementById('score').textContent=`Puntaje: ${good} / ${Object.keys(answered).length} respondidas de ${qs.length}`}
function resetQuiz(){answered={};good=0;render();scrollTo({top:0,behavior:'smooth'})}
function shuffleQuiz(){for(let i=qs.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[qs[i],qs[j]]=[qs[j],qs[i]]}resetQuiz()}
render();
</script>
</body></html>
