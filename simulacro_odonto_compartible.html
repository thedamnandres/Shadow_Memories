<!doctype html>
<html lang='es'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Simulacro Interactivo Odonto</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f6f0ff;color:#251d33}header{background:linear-gradient(135deg,#7b5cff,#ff7eb6);color:white;text-align:center;padding:28px 16px}.wrap{max-width:920px;margin:auto;padding:18px}.bar{display:flex;gap:10px;justify-content:space-between;align-items:center;flex-wrap:wrap;margin:12px 0}.score,.card{background:white;border-radius:18px;box-shadow:0 4px 18px #0001}.score{padding:12px 16px;font-weight:700}.card{padding:20px;margin:18px 0}.tag{display:inline-block;background:#eee7ff;color:#5d3cff;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700}h2{color:#5d3cff;font-size:20px}.q{line-height:1.55}.opt{display:block;width:100%;text-align:left;border:2px solid #e7e1f5;background:#fbfaff;border-radius:13px;padding:12px;margin:9px 0;cursor:pointer;font-size:15px}.opt:hover{border-color:#9b82ff;background:#f3efff}.ok{border-color:#20b26b!important;background:#e9fff3!important}.bad{border-color:#e84b6a!important;background:#fff0f3!important}.fb{display:none;margin-top:12px;border-radius:13px;padding:13px;line-height:1.5}.good{display:block;background:#e9fff3;border:1px solid #20b26b}.wrong{display:block;background:#fff0f3;border:1px solid #e84b6a}.btn{border:0;background:#7b5cff;color:white;padding:11px 14px;border-radius:12px;font-weight:700;cursor:pointer}.btn:hover{background:#6347df}footer{text-align:center;color:#6b617a;padding:20px;font-size:13px}
</style>
</head>
<body>
<header><h1>🦷 Simulacro Interactivo de Odonto</h1><p>Casos clínicos + fármacos/dosis. Elige una opción y revisa la explicación.</p></header>
<div class='wrap'>
<div class='bar'><div class='score' id='score'>Puntaje: 0 / 0</div><button class='btn' onclick='resetQuiz()'>Reiniciar prueba</button></div>
<div id='quiz'></div>
</div>
<footer>Hecho para estudiar rápido 💖</footer>
<script>
const qs=[
{t:'Caso clínico',q:'Paciente masculino de 28 años acude para restauración profunda en molar inferior. Se administra lidocaína al 2% con epinefrina. A los pocos minutos no siente dolor durante el fresado. ¿Cuál es el mecanismo principal?',o:['Inhibición de COX y reducción de prostaglandinas.','Estimulación alfa-adrenérgica periférica.','Bloqueo de canales de sodio y detención de conducción nerviosa.','Activación de receptores opioides centrales.'],a:2,w:'Los anestésicos locales bloquean canales de sodio; sin entrada de sodio no hay despolarización del nervio ni transmisión del dolor.',c:'Se puede continuar si el paciente está estable y la anestesia es efectiva.'},
{t:'Caso clínico',q:'Paciente con absceso dentoalveolar agudo. Se infiltra anestesia directamente en zona inflamada, pero sigue sintiendo dolor. ¿Cuál es la causa más probable?',o:['El pH ácido de la infección reduce la eficacia del anestésico.','La epinefrina neutraliza la lidocaína.','El anestésico se vuelve antibiótico en tejido inflamado.','La inflamación bloquea receptores opioides.'],a:0,w:'En infección hay pH bajo, inflamación y mayor flujo sanguíneo; eso dificulta la entrada del anestésico al nervio.',c:'No insistir directo en el absceso; preferir bloqueo regional, drenaje y manejo de la infección.'},
{t:'Caso clínico',q:'Minutos después de anestesia local, un paciente presenta sabor metálico, mareo, zumbido de oídos, visión borrosa y temblor. ¿Qué sospechas?',o:['Shock anafiláctico.','Síncope vasovagal.','Toxicidad sistémica por anestésico local.','Crisis asmática.'],a:2,w:'Sabor metálico, acúfenos, visión borrosa y temblor son signos tempranos de toxicidad sistémica por anestésico local.',c:'Suspender, mantener vía aérea, administrar oxígeno y vigilar signos vitales.'},
{t:'Caso clínico',q:'Paciente cardiovascular controlado requiere lidocaína con epinefrina 1:100 000. ¿Cuál es la dosis máxima aproximada de epinefrina?',o:['0,2 mg.','0,04 mg.','0,4 mg.','No tiene límite si se aspira.'],a:1,w:'En pacientes con compromiso cardiovascular se limita la epinefrina a 0,04 mg, aprox. dos cartuchos 1:100 000.',c:'Atender si está estable, con aspiración, dosis limitada y control del estrés.'},
{t:'Caso clínico',q:'Paciente hipertenso no controlado llega para exodoncia electiva. PA: 184/112 mmHg. ¿Qué conducta es más adecuada?',o:['Realizar con anestesia sin vasoconstrictor.','Realizar rápido para evitar estrés.','Posponer y derivar para control médico.','Indicar AINE y continuar.'],a:2,w:'Cifras cercanas o superiores a 180/110 mmHg son de alto riesgo para procedimientos electivos.',c:'No atender electivo en ese momento; controlar médicamente primero.'},
{t:'Caso clínico',q:'Paciente con hipertiroidismo no controlado presenta palpitaciones, temblor, ansiedad e intolerancia al calor. Acude a cirugía periodontal electiva. ¿Qué haces?',o:['Atiendes con epinefrina.','Pospones y solicitas valoración médica.','Das profilaxis antibiótica y continúas.','Usas corticoide para evitar dolor.'],a:1,w:'El hipertiroidismo no controlado aumenta la respuesta a catecolaminas y el estrés/cirugía puede precipitar complicaciones.',c:'No realizar tratamiento electivo; primero control médico.'},
{t:'Caso clínico',q:'Paciente ansioso ve la aguja, se pone pálido, sudoroso, con náuseas y pierde la conciencia brevemente. ¿Diagnóstico probable?',o:['Toxicidad por anestésico.','Síncope vasovagal.','Anafilaxia.','Crisis hipertensiva.'],a:1,w:'Palidez, sudoración, náusea y pérdida breve de conciencia por miedo sugieren síncope vasovagal.',c:'Posición supina con piernas elevadas, vía aérea, oxígeno y signos vitales.'},
{t:'Caso clínico',q:'Después de recibir un medicamento, el paciente presenta urticaria, edema labial, sibilancias y dificultad respiratoria. ¿Conducta inicial?',o:['Ibuprofeno VO.','Amoxicilina VO.','Adrenalina 1:1000 y oxígeno.','Paracetamol y observación.'],a:2,w:'Urticaria + edema + sibilancias + dificultad respiratoria sugieren anafilaxia.',c:'Suspender todo, adrenalina, oxígeno y activar urgencias.'},
{t:'Caso clínico',q:'Paciente asmático presenta sibilancias y opresión torácica durante la consulta. ¿Conducta inicial?',o:['Suspender, semisentado, oxígeno y broncodilatador.','Acostarlo y continuar.','Dar AINE para broncoconstricción.','Administrar antibiótico profiláctico.'],a:0,w:'En crisis asmática se suspende el procedimiento, se facilita respiración y se usa broncodilatador con oxígeno.',c:'No continuar hasta estabilizar; si no mejora, activar urgencias.'},
{t:'Caso clínico',q:'Paciente con EPOC refiere disnea al acostarse. Necesita ajuste protésico. ¿Adaptación adecuada?',o:['Decúbito supino completo.','Cita larga para terminar rápido.','Posición semisentada y citas cortas.','Evitar toda atención aunque esté estable.'],a:2,w:'En EPOC puede empeorar la disnea en posición supina.',c:'Atender semisentado, con citas cortas y control de ansiedad.'},
{t:'Caso clínico',q:'Paciente con gastritis importante necesita analgésico para dolor dental leve-moderado. Se evita AINE. ¿Qué fármaco es mejor opción?',o:['Ketorolaco.','Diclofenaco.','Paracetamol.','Ácido acetilsalicílico.'],a:2,w:'Paracetamol es analgésico y antipirético, con menor irritación gástrica que AINE.',c:'Usarlo si no hay contraindicación hepática o sobredosis.'},
{t:'Caso clínico',q:'Paciente con úlcera gástrica activa consulta por dolor posterior a exodoncia. Se considera diclofenaco. ¿Por qué se debe evitar?',o:['Porque bloquea canales de sodio.','Porque disminuye protección gástrica por inhibición de COX-1.','Porque produce candidiasis.','Porque aumenta prostaglandinas gástricas.'],a:1,w:'Los AINE pueden inhibir COX-1 y disminuir prostaglandinas protectoras de la mucosa gástrica.',c:'Elegir alternativa y valorar riesgo gastrointestinal.'},
{t:'Caso clínico',q:'Paciente diabético tipo 2 controlado requiere cirugía de tercer molar. Se considera dexametasona para edema. ¿Qué efecto debe vigilarse?',o:['Hipocalcemia aguda.','Hiperglucemia.','Bradicardia severa.','Metahemoglobinemia.'],a:1,w:'Los glucocorticoides pueden elevar la glucosa sanguínea.',c:'Puede usarse si está indicada, pero con control glucémico.'},
{t:'Caso clínico',q:'Paciente con fiebre, trismus leve, aumento de volumen facial y celulitis odontógena. ¿Cuál manejo es más coherente?',o:['Solo paracetamol.','Aciclovir.','Nistatina tópica.','Manejo dental local más antibiótico con cobertura mixta.'],a:3,w:'Fiebre y celulitis sugieren diseminación; se requiere tratar la causa dental y antibiótico adecuado.',c:'Atender como urgencia: drenaje/endodoncia/exodoncia según caso.'},
{t:'Caso clínico',q:'Paciente con válvula cardíaca protésica requiere extracción dental. ¿Qué conducta farmacológica previa corresponde?',o:['Profilaxis antibiótica.','Ibuprofeno 1 hora antes.','Suspender todos sus medicamentos.','No indicar nada porque solo es dental.'],a:0,w:'Válvula protésica es riesgo para endocarditis; extracción manipula tejido gingival/periapical.',c:'Atender con profilaxis si está indicada.'},
{t:'Caso clínico',q:'Paciente con radiografía periapical y ajuste de prótesis removible, sin sangrado ni manipulación gingival. ¿Qué haces con profilaxis antibiótica?',o:['Amoxicilina 2 g para todo procedimiento.','Metronidazol por 7 días.','No indicar profilaxis.','Clindamicina obligatoria.'],a:2,w:'La profilaxis no se indica para procedimientos no invasivos sin sangrado ni manipulación gingival/periapical.',c:'Atender sin antibiótico profiláctico.'},
{t:'Caso clínico',q:'Paciente con vesículas dolorosas en labio, ardor previo y episodios recurrentes por estrés. ¿Fármaco relacionado?',o:['Aciclovir.','Fluconazol.','Amoxicilina.','Metronidazol.'],a:0,w:'Herpes simple tipo I se maneja con antivirales como aciclovir.',c:'Si lesión activa y procedimiento electivo, posponer por contagio.'},
{t:'Caso clínico',q:'Paciente usa prótesis total superior y presenta placas blanquecinas removibles con ardor; usó antibióticos recientemente. ¿Fármaco relacionado?',o:['Aciclovir.','Nistatina.','Azitromicina.','Ciprofloxacina.'],a:1,w:'Placas blanquecinas removibles sugieren candidiasis oral; nistatina es antimicótico clásico.',c:'Tratar candidiasis y mejorar higiene de prótesis.'},
{t:'Fármaco y dosis',q:'Cartucho dental de lidocaína al 2% de 1,8 mL. ¿Cuántos mg contiene?',o:['18 mg.','27 mg.','36 mg.','72 mg.'],a:2,w:'2% = 20 mg/mL. 20 × 1,8 = 36 mg.',c:'Regla rápida: porcentaje × 10 = mg/mL.'},
{t:'Fármaco y dosis',q:'Cartucho de articaína al 4% de 1,8 mL. ¿Cuántos mg contiene?',o:['36 mg.','54 mg.','72 mg.','90 mg.'],a:2,w:'4% = 40 mg/mL. 40 × 1,8 = 72 mg.',c:'Calcular dosis total si se usan varios cartuchos.'},
{t:'Fármaco y dosis',q:'Paciente de 60 kg requiere lidocaína con vasoconstrictor. Si la dosis máxima es 7 mg/kg, ¿cuál es la dosis máxima aproximada?',o:['240 mg.','300 mg.','420 mg.','600 mg.'],a:2,w:'60 × 7 = 420 mg.',c:'También hay que considerar límite de vasoconstrictor.'},
{t:'Fármaco y dosis',q:'Paciente sano ASA I requiere cirugía periodontal. ¿Cuál es la dosis máxima de epinefrina en paciente sano?',o:['0,04 mg.','0,1 mg.','0,2 mg.','0,8 mg.'],a:2,w:'Paciente sano: epinefrina máxima aproximada 0,2 mg.',c:'Clave: sano 0,2 mg; cardiovascular 0,04 mg.'},
{t:'Fármaco y dosis',q:'Paciente con válvula cardíaca protésica requiere extracción. ¿Esquema estándar de profilaxis antibiótica VO en adulto?',o:['Amoxicilina 500 mg c/8 h por 7 días.','Amoxicilina 2 g 30–60 min antes.','Clindamicina 300 mg c/8 h por 5 días.','Azitromicina 250 mg c/12 h por 3 días.'],a:1,w:'La profilaxis para endocarditis es dosis única antes del procedimiento.',c:'Administrar 30–60 minutos antes si está indicada.'},
{t:'Fármaco y dosis',q:'Niño de 20 kg requiere profilaxis con amoxicilina. Si la dosis es 50 mg/kg, ¿cuánto corresponde?',o:['250 mg.','500 mg.','1 000 mg.','2 000 mg.'],a:2,w:'20 kg × 50 mg/kg = 1 000 mg.',c:'En pediatría se calcula por peso.'},
{t:'Fármaco y dosis',q:'Adulto alérgico a penicilina requiere profilaxis y se decide clindamicina. ¿Dosis correspondiente?',o:['150 mg VO 1 hora antes.','300 mg VO 1 hora antes.','600 mg VO 30–60 min antes.','1 g VO 30–60 min antes.'],a:2,w:'Clindamicina en profilaxis adulta: 600 mg antes del procedimiento.',c:'Confirmar tipo de alergia y seleccionar alternativa segura.'},
{t:'Fármaco y dosis',q:'Dolor posquirúrgico agudo. ¿Dosis oral adecuada de ketorolaco?',o:['10 mg c/4–6 h, máximo 40 mg/día.','500 mg c/8 h.','100 mg c/12 h.','2 g una hora antes.'],a:0,w:'Ketorolaco oral: 10 mg cada 4–6 horas, máximo 40 mg/día.',c:'Usar por poco tiempo y evitar en riesgo gástrico/renal/sangrado.'},
{t:'Fármaco y dosis',q:'Dolor postoperatorio moderado-severo. ¿Esquema de diclofenaco potásico?',o:['10 mg cada 4 h.','50 mg VO cada 8 h.','2 g en dosis única.','600 mg cada 12 h.'],a:1,w:'Diclofenaco potásico: 50 mg cada 8 horas.',c:'Cuidado en gastritis, úlcera, renal, anticoagulantes o riesgo cardiovascular.'},
{t:'Fármaco y dosis',q:'Dolor persistente posterior a cirugía periodontal. Se busca AINE de mayor duración. ¿Esquema de naproxeno?',o:['250–500 mg VO cada 12 h.','10 mg VO cada 4 h.','600 mg VO cada 6 h.','50 mg VO cada 8 h.'],a:0,w:'Naproxeno suele administrarse cada 12 horas.',c:'Cuidar riesgo gastrointestinal, renal o cardiovascular.'},
{t:'Fármaco y dosis',q:'Paciente recibe metronidazol por infección periodontal. Pregunta si puede tomar alcohol. ¿Qué indicas?',o:['Debe evitar alcohol por reacción tipo disulfiram.','El alcohol aumenta la eficacia antibacteriana.','No hay interacción relevante.','Solo debe evitar lácteos.'],a:0,w:'Metronidazol puede causar reacción tipo disulfiram con alcohol.',c:'Indicar evitar alcohol durante el tratamiento.'},
{t:'Fármaco y dosis',q:'Herpes simple oral recurrente. Se decide aciclovir. ¿Cuál dosis aparece en la guía revisada?',o:['200 mg c/6 h o 400 mg c/12 h.','2 g dosis única antes del procedimiento.','500 mg c/8 h por 7 días.','100 000 U c/6 h.'],a:0,w:'Aciclovir se usa en herpes simple; dosis estudiada: 200 mg cada 6 h o 400 mg cada 12 h.',c:'Herpes = antiviral; cándida = antimicótico.'}
];
let answered={},good=0;
function render(){const box=document.getElementById('quiz');box.innerHTML='';qs.forEach((x,n)=>{let ops=x.o.map((v,i)=>`<button class='opt' onclick='sel(${n},${i},this)'><b>${String.fromCharCode(65+i)})</b> ${v}</button>`).join('');box.innerHTML+=`<div class='card'><span class='tag'>${x.t}</span><h2>Pregunta ${n+1}</h2><div class='q'>${x.q}</div>${ops}<div class='fb' id='f${n}'></div></div>`});score()}
function sel(n,i,b){if(answered[n])return;answered[n]=1;let x=qs[n],card=b.parentElement,bs=card.querySelectorAll('.opt');bs.forEach((z,k)=>{z.disabled=true;if(k==x.a)z.classList.add('ok');if(k==i&&i!=x.a)z.classList.add('bad')});let f=document.getElementById('f'+n);if(i==x.a){good++;f.className='fb good';f.innerHTML=`✅ <b>¡Correcto!</b><br>Respuesta: <b>${String.fromCharCode(65+x.a)}</b><br><b>¿Por qué?</b> ${x.w}<br><b>Qué hacer:</b> ${x.c}`;}else{f.className='fb wrong';f.innerHTML=`❌ <b>No exactamente.</b><br>Marcaste: <b>${String.fromCharCode(65+i)}</b><br>Correcta: <b>${String.fromCharCode(65+x.a)}</b><br><b>¿Por qué?</b> ${x.w}<br><b>Qué hacer:</b> ${x.c}`;}score()}
function score(){document.getElementById('score').textContent=`Puntaje: ${good} / ${Object.keys(answered).length} respondidas de ${qs.length}`}
function resetQuiz(){answered={};good=0;render();scrollTo({top:0,behavior:'smooth'})}
render();
</script>
</body></html>
