let answered={},good=0;
function render(){const box=document.getElementById('quiz');box.innerHTML='';qs.forEach((x,n)=>{let ops=x.o.map((v,i)=>`<button class="opt" onclick="sel(${n},${i},this)"><b>${String.fromCharCode(65+i)})</b> ${v}</button>`).join('');box.innerHTML+=`<div class="card"><span class="tag">${x.t}</span><h2>Pregunta ${n+1}</h2><div class="q">${x.q}</div>${ops}<div class="fb" id="f${n}"></div></div>`});score()}
function sel(n,i,b){if(answered[n])return;answered[n]=1;let x=qs[n],card=b.parentElement,bs=card.querySelectorAll('.opt');bs.forEach((z,k)=>{z.disabled=true;if(k==x.a)z.classList.add('ok');if(k==i&&i!=x.a)z.classList.add('bad')});let f=document.getElementById('f'+n);if(i==x.a){good++;f.className='fb good';f.innerHTML=`✅ <b>¡Correcto!</b><br>Respuesta: <b>${String.fromCharCode(65+x.a)}</b><br><b>¿Por qué?</b> ${x.w}<br><b>Qué hacer:</b> ${x.c}`;}else{f.className='fb wrong';f.innerHTML=`❌ <b>No exactamente.</b><br>Marcaste: <b>${String.fromCharCode(65+i)}</b><br>Correcta: <b>${String.fromCharCode(65+x.a)}</b><br><b>¿Por qué?</b> ${x.w}<br><b>Qué hacer:</b> ${x.c}`;}score()}
function score(){document.getElementById('score').textContent=`Puntaje: ${good} / ${Object.keys(answered).length} respondidas de ${qs.length}`}
function resetQuiz(){answered={};good=0;render();scrollTo({top:0,behavior:'smooth'})}
function shuffleQuiz(){for(let i=qs.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[qs[i],qs[j]]=[qs[j],qs[i]]}resetQuiz()}
render();
</script></body></html>
